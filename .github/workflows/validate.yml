name: Validate Marketplace

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate-structure:
    name: Validate marketplace structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate marketplace.json
        run: bash scripts/validate-marketplace.sh

  validate-marketplace-plugins:
    name: Validate marketplace plugin entries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin entries
        run: bash scripts/validate-plugin-entries.sh

  validate-plugins:
    name: Validate plugin files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugins
        run: bash scripts/validate-plugins.sh

  check-duplicates:
    name: Check duplicate plugin names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for duplicates
        run: bash scripts/check-duplicates.sh
